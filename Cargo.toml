[package]
name = "morphey"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]
path = "src/entry_point.rs"

[features]
default = ["debug-logging"]
debug-logging = []

[dependencies]
hudhook = { git = "https://github.com/Fetch1337/hudhook.git" }
obfstr = "0.4"
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smallvec = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
windows = { version = "0.62", features = [
    "Win32_Foundation",
    "Win32_System_SystemServices",
    "Win32_System_LibraryLoader",
    "Win32_System_Threading",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_WindowsAndMessaging",
] }
